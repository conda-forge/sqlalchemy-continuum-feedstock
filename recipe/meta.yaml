{% set name = "sqlalchemy-continuum" %}
{% set version = "1.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/sqlalchemy_continuum-{{ version }}.tar.gz
  sha256: fcb6e5e1630f42ebfdadc2ffc077c9b3d8b998d3e959b05ff2bdff21c9b5007e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - sqlalchemy >=1.4.0
    - sqlalchemy-utils >=0.41.2

test:
  imports:
    - sqlalchemy_continuum
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/kvesteri/sqlalchemy-continuum
  summary: Versioning and auditing extension for SQLAlchemy.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - renan-r-santos
